<section class="gallery-admin-panel">
  <div class="gallery-admin-head">
    <div>
      <h2>คลังกิจกรรมโรงเรียน</h2>
      <p>เพิ่มรูปกิจกรรม แก้ไข ลบ ปักหมุด และจัดหมวดหมู่ได้จากหน้าเว็บ</p>
    </div>

    <div class="gallery-tools">
      <select id="galleryCategoryFilter">
        <option value="">ทั้งหมด</option>
        <option value="กิจกรรม">กิจกรรม</option>
        <option value="ธนาคารขยะ">ธนาคารขยะ</option>
        <option value="รางวัล">รางวัล</option>
        <option value="ประชาสัมพันธ์">ประชาสัมพันธ์</option>
      </select>

      <button class="gallery-add-btn" id="openGalleryUpload">+ เพิ่มรูปกิจกรรม</button>
    </div>
  </div>

  <div class="gallery-grid masonry" id="galleryGrid"></div>
</section>

<div class="gallery-modal" id="galleryModal">
  <div class="gallery-modal-card">
    <button class="gallery-close" id="closeGalleryUpload">×</button>
    <h3>เพิ่มรูปกิจกรรม</h3>

    <label class="gallery-upload-box">
      <input type="file" id="galleryImageInput" accept="image/*" multiple>
      <span>📷 เลือกรูปภาพหลายรูป</span>
    </label>

    <div class="gallery-preview-list" id="galleryPreviewList"></div>

    <input type="text" id="galleryTitle" placeholder="ชื่อกิจกรรม">
    <textarea id="galleryDesc" placeholder="รายละเอียดกิจกรรม"></textarea>

    <select id="galleryCategory">
      <option value="กิจกรรม">กิจกรรม</option>
      <option value="ธนาคารขยะ">ธนาคารขยะ</option>
      <option value="รางวัล">รางวัล</option>
      <option value="ประชาสัมพันธ์">ประชาสัมพันธ์</option>
    </select>

    <button class="gallery-submit-btn" id="submitGalleryImage">อัปโหลดรูป</button>
  </div>
</div>

<div class="gallery-lightbox" id="galleryLightbox">
  <button id="galleryLightboxClose">×</button>
  <img src="" alt="">
  <div>
    <strong></strong>
    <p></p>
  </div>
</div>
