<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/ranking.css">
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>

<div class="loading-screen" role="status" aria-label="Loading">
  <div class="loading-bottle">
    <svg viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M22 6h16v14c6 6 8 10 8 20v46a6 6 0 0 1-6 6H20a6 6 0 0 1-6-6V40c0-10 2-14 8-20V6z" fill="none" stroke="#eafff5" stroke-width="3"/>
      <clipPath id="loadClip3"><path d="M22 6h16v14c6 6 8 10 8 20v46a6 6 0 0 1-6 6H20a6 6 0 0 1-6-6V40c0-10 2-14 8-20V6z"/></clipPath>
      <g clip-path="url(#loadClip3)" class="loading-fill"><rect x="10" y="55" width="40" height="45" fill="#12b76a"/></g>
    </svg>
  </div>
  <p class="loading-text">Loading Ranking…</p>
</div>

<header class="navbar">
  <div class="container">
    <a href="index.html" class="brand">
      <span class="brand-logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M9 2h6v4l3 4v9a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3v-9l3-4V2z"/></svg></span>
      <span class="brand-name">Bottle<span>Battle</span></span>
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home Site</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="submit.html">Submit</a>
    </nav>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      </button>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<div class="dash-shell">
  <aside class="dash-sidebar" id="dashSidebar"></aside>
  <button class="dash-sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>

  <main id="main" class="dash-main ranking-main">
  <div class="container">
    <div class="ranking-card reveal">

      <!-- Background image lives only in this top strip (header + podium) -->
      <div class="ranking-hero-strip">
        <div class="hero-bg-orb orb-1"></div>
        <div class="hero-bg-orb orb-2"></div>

        <div class="ranking-card-head">
          <span class="ranking-card-icon">🏆</span>
          <div>
            <h1>อันดับห้องเรียน <span class="en">(Battle Ranking)</span></h1>
            <p>คะแนนคำนวณจากน้ำหนัก PET ที่ส่งเข้าระบบ หากเท่ากันตัดสินจากผู้ที่ส่งก่อน</p>
          </div>
        </div>

        <!-- Podium -->
        <div class="podium podium--card" id="podium">
          <div class="skeleton" style="height:140px;width:100%;grid-column:1/-1;background:rgba(255,255,255,0.12);"></div>
        </div>
      </div>

      <!-- Rank 4-10 (plain dark background, no image) -->
      <div class="rank-grid-section">
        <h3 class="rank-grid-title">อันดับ 4 - 10</h3>
        <div class="rank-grid" id="rankGrid">
          <div class="skeleton" style="height:80px;width:100%;grid-column:1/-1;background:rgba(255,255,255,0.08);"></div>
        </div>
      </div>

      <!-- Target note -->
      <div class="ranking-target-note" id="targetNote">🎯 เป้าหมายทั้งโรงเรียน: 100 <strong id="targetGapKg"></strong></div>
    </div>
  </div>
  </main>
</div>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom" style="border:none;padding-top:0;">
      <span>&copy; <span class="js-year"></span> Bottle Battle · โรงเรียนไทรโยคมณีกาญจน์วิทยา</span>
    </div>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/ranking.js"></script>
</body>
</html>
